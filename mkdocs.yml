site_name: Secure Your Repo
site_url: https://commit-issues.github.io/secure-your-repo
site_description: A field guide for securing your GitHub presence, repositories, identity, and code.
site_author: SudoChef

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/commit-issues
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/sudochef

copyright: "© SudoChef — @sudochef — Build like you are the target."
